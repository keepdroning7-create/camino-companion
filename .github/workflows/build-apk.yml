name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Lower minSdk to 23 for Android 6+ compatibility
        run: sed -i 's/minSdkVersion = 24/minSdkVersion = 23/' android/variables.gradle

      - name: Enable v1+v2+v3 signing for broad compatibility
        run: python3 .github/scripts/patch-build-gradle.py

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK (signed with debug key)
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Verify APK signing
        run: |
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort | tail -1)
          $APKSIGNER verify -v android/app/build/outputs/apk/debug/app-debug.apk || true

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk camino-companion.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Camino Companion #${{ github.run_number }}"
          body: |
            Automatyczny build z commita `${{ github.sha }}`.

            **Instalacja:**
            1. Pobierz plik `camino-companion.apk` poniżej
            2. Na telefonie: Ustawienia → Bezpieczeństwo → Instalacja z nieznanych źródeł
            3. Otwórz pobrany plik i zainstaluj
          files: camino-companion.apk
