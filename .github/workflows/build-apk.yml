name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK (unsigned)
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Camino Companion #${{ github.run_number }}"
          body: |
            Automatyczny build z commita `${{ github.sha }}`.

            **Instalacja:**
            1. Pobierz plik `.apk` poniżej
            2. Na telefonie: Ustawienia → Bezpieczeństwo → Instalacja z nieznanych źródeł
            3. Otwórz pobrany plik i zainstaluj
          files: android/app/build/outputs/apk/release/app-release-unsigned.apk
